name: device-management-toolkit

services:
  console:
    restart: always
    image: intel/device-mgmt-toolkit-console:latest
    build:
      context: ./services/console
      dockerfile: ./Dockerfile
    networks:
      - openamtnetwork
    env_file:
      - .env
    environment:
      APP_COMMON_NAME: ${MPS_COMMON_NAME}
      DB_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/rpsdb
      SECRET_ADDR: http://vault:8200
      SECRET_TOKEN: ${VAULT_TOKEN}
      HTTP_PORT: "8181"
      LOG_LEVEL: info
      GIN_MODE: debug
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8181/api/v1/health"]
      interval: 12s
      timeout: 12s
      retries: 3
    ports:
      - "8181:8181"
      - "${MPSPORT}:4433"

  webui:
    restart: always
    image: intel/oact-webui:latest
    networks:
      - openamtnetwork
    build:
      context: ./services/sample-web-ui
      dockerfile: ./Dockerfile
    environment:
      RPS_SERVER: https://${MPS_COMMON_NAME}/rps
      MPS_SERVER: https://${MPS_COMMON_NAME}/mps
      VAULT_SERVER: https://${MPS_COMMON_NAME}/vault

  rps:
    restart: always
    image: intel/oact-rps:latest
    networks:
      - openamtnetwork
    build:
      context: ./services/rps
      dockerfile: ./Dockerfile
    env_file:
      - .env
    healthcheck:
      interval: 12s
      timeout: 12s
      retries: 3
      test: ["CMD", "node", "rps/dist/Healthcheck.js"]
    environment:
      RPS_MPS_SERVER: http://console:8181
      RPS_SECRETS_PATH: ${SECRETS_PATH}
      RPS_VAULT_TOKEN: ${VAULT_TOKEN}
      RPS_VAULT_ADDRESS: ${VAULT_ADDRESS}
      RPS_CONNECTION_STRING: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/rpsdb
      RPS_CONSUL_ENABLED: ${CONSUL_ENABLED}
      RPS_CONSUL_HOST: ${CONSUL_HOST}
      RPS_CONSUL_PORT: ${CONSUL_PORT}

  mpsrouter:
    restart: always
    image: intel/oact-mpsrouter:latest
    build:
      context: ./services/mps-router
      dockerfile: ./Dockerfile
    networks:
      - openamtnetwork
    environment:
      MPS_CONNECTION_STRING: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/rpsdb?sslmode=disable
      PORT: ${PORT}
      MPS_PORT: ${MPSWEBPORT}
    healthcheck:
      interval: 12s
      timeout: 12s
      retries: 3
      test: ["CMD", "/app", "--health"]

  db:
    restart: always
    image: postgres:18
    build:
      context: ./pg
      dockerfile: ./Dockerfile
    networks:
      - openamtnetwork
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d rpsdb"]
      interval: 2s
      timeout: 3s
      retries: 30
    environment:
      POSTGRES_DB: rpsdb
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - 5432:5432
    volumes:
      - ./data:/docker-entrypoint-initdb.d

  vault:
    restart: always
    image: hashicorp/vault:1.21
    networks:
      - openamtnetwork
    ports:
      - 8200:8200
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    cap_add:
      - IPC_LOCK

  kong:
    restart: always
    image: kong:3.9
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 10s
      retries: 10
    command:
      - "kong"
      - "start"
      - "--vv"
    environment:
      - KONG_DATABASE=off
      - KONG_CASSANDRA_CONTACT_POINTS=kong-database
      - KONG_ADMIN_LISTEN=0.0.0.0:8001
      - KONG_ADMIN_LISTEN_SSL=0.0.0.0:8444
      - KONG_NGINX_DAEMON=off
      - KONG_DECLARATIVE_CONFIG=/home/kong/kong.yml
      - KONG_PROXY_ERROR_LOG=/dev/stderr
      - KONG_PROXY_ACCESS_LOG=/dev/stdout
      - KONG_ADMIN_ACCESS_LOG=/dev/stdout
      - KONG_ADMIN_ERROR_LOG=/dev/stderr
      - KONG_DNS_ORDER=LAST,A,CNAME
      - KONG_UPSTREAM_KEEPALIVE_POOL_SIZE=0
    networks:
      - openamtnetwork
    volumes:
      - ./kong.yaml:/home/kong/kong.yml
    ports:
      - 443:8443
      - 8001:8001

volumes:
  app-volume:
  private-volume:

networks:
  openamtnetwork:
    driver: "bridge"
