name: Build Windows Installer

on:
  workflow_dispatch:
    inputs:
      console_version:
        description: "Console release tag to package (e.g. v1.28.1). Empty = latest."
        required: false
        default: ""
      installer_version:
        description: "Installer version string baked into the .exe. Empty = derived from console tag."
        required: false
        default: ""
      webui_version:
        description: "Sample Web UI ref to build into the full installer. Empty = main (matches the Console release build)."
        required: false
        default: ""
      release_tag:
        description: "Deployment release tag to publish to (e.g. v3.0.0). Empty = v<installer_version>."
        required: false
        default: ""
      release_name:
        description: "Human-friendly release name (e.g. 'May 2026'). Empty = release tag."
        required: false
        default: ""
      prerelease:
        description: "Mark the GitHub release as a pre-release."
        type: boolean
        required: false
        default: false

# Least-privilege default for the workflow; the build job elevates to write.
permissions:
  contents: read

jobs:
  build:
    name: Build NSIS setup.exe
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout deployment repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Resolve console version
        id: ver
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REQUESTED: ${{ inputs.console_version }}
          INSTALLER_VERSION_INPUT: ${{ inputs.installer_version }}
          WEBUI_INPUT: ${{ inputs.webui_version }}
          RELEASE_TAG_INPUT: ${{ inputs.release_tag }}
          RELEASE_NAME_INPUT: ${{ inputs.release_name }}
        run: |
          set -euo pipefail
          if [ -n "$REQUESTED" ]; then
            tag="$REQUESTED"
          else
            tag=$(gh release view --repo device-management-toolkit/console --json tagName -q .tagName)
          fi
          if [ -n "$INSTALLER_VERSION_INPUT" ]; then
            installer_version="$INSTALLER_VERSION_INPUT"
          else
            installer_version="${tag#v}"
          fi
          webui_ref="${WEBUI_INPUT:-main}"
          # Deployment release tag is independent of the console version it packages.
          release_tag="${RELEASE_TAG_INPUT:-v$installer_version}"
          release_name="${RELEASE_NAME_INPUT:-$release_tag}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "installer_version=$installer_version" >> "$GITHUB_OUTPUT"
          echo "webui_ref=$webui_ref" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "release_name=$release_name" >> "$GITHUB_OUTPUT"
          echo "Console tag: $tag"
          echo "Installer version: $installer_version"
          echo "Web UI ref: $webui_ref"
          echo "Release: $release_name ($release_tag)"

      - name: Checkout console source at release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: device-management-toolkit/console
          ref: ${{ steps.ver.outputs.tag }}
          path: services/console
          persist-credentials: false

      - name: Checkout sample-web-ui source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: device-management-toolkit/sample-web-ui
          ref: ${{ steps.ver.outputs.webui_ref }}
          path: services/sample-web-ui
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: services/console/go.mod

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.x

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Build NSIS installers
        shell: bash
        env:
          INSTALLER_VERSION: ${{ steps.ver.outputs.installer_version }}
        run: |
          chmod +x ./installers/windows/build-installers.sh
          ./installers/windows/build-installers.sh "$INSTALLER_VERSION" x64

      - name: Publish installers to release
        uses: svenstaro/upload-release-action@29e53e917877a24fad85510ded594ab3c9ca12de # v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/windows/*_setup.exe
          file_glob: true
          tag: ${{ steps.ver.outputs.release_tag }}
          release_name: ${{ steps.ver.outputs.release_name }}
          prerelease: ${{ inputs.prerelease }}
          overwrite: true
          body: "Device Management Toolkit Console installers (Console ${{ steps.ver.outputs.tag }})"
