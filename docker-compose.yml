name: device-management-toolkit

services:
  console:
    restart: always
    image: intel/device-mgmt-toolkit-console:latest
    build:
      context: ./services/console
      dockerfile: ./Dockerfile
    networks:
      - dmtnetwork
    env_file:
      - .env
    environment:
      GIN_MODE: debug
      HEADLESS: "true"
      APP_COMMON_NAME: ${MPS_COMMON_NAME}
      DB_PROVIDER: postgres
      DB_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/rpsdb
      SECRETS_ADDR: http://vault:8200
      SECRETS_TOKEN: ${VAULT_TOKEN}
      SECRETS_PATH: ${SECRETS_PATH}
      HTTP_HOST: "0.0.0.0"
      HTTP_PORT: "8181"
      HTTP_TLS_ENABLED: "false"
      LOG_LEVEL: ${LOG_LEVEL}
      APP_DISABLE_CIRA: "false"
    healthcheck:
      test: ["CMD", "/app", "--health"]
      interval: 12s
      timeout: 12s
      retries: 3
    expose:
      - "8181"
      - "4433"

  webui:
    restart: always
    image: intel/oact-webui:latest
    networks:
      - dmtnetwork
    build:
      context: ./services/sample-web-ui
      dockerfile: ./Dockerfile
      args:
        BUILD_CONFIGURATION: enterprise
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    environment:
      CONSOLE_SERVER_API: https://${MPS_COMMON_NAME}
      VAULT_SERVER: https://${MPS_COMMON_NAME}/vault

  rps:
    restart: always
    image: intel/oact-rps:latest
    networks:
      - dmtnetwork
    build:
      context: ./services/rps
      dockerfile: ./Dockerfile
    env_file:
      - .env
    healthcheck:
      interval: 12s
      timeout: 12s
      retries: 3
      test: ["CMD", "node", "rps/dist/Healthcheck.js"]
    environment:
      RPS_MPS_SERVER: http://console:8181
      RPS_SECRETS_PATH: ${SECRETS_PATH}
      RPS_VAULT_TOKEN: ${VAULT_TOKEN}
      RPS_VAULT_ADDRESS: ${VAULT_ADDRESS}
      RPS_CONNECTION_STRING: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/rpsdb
      RPS_CONSUL_ENABLED: ${CONSUL_ENABLED}
      RPS_CONSUL_HOST: ${CONSUL_HOST}
      RPS_CONSUL_PORT: ${CONSUL_PORT}


  db:
    restart: always
    image: postgres:18
    build:
      context: ./pg
      dockerfile: ./Dockerfile
    networks:
      - dmtnetwork
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d rpsdb"]
      interval: 2s
      timeout: 3s
      retries: 30
    environment:
      POSTGRES_DB: rpsdb
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - 5432:5432
  

  vault:
    restart: always
    image: hashicorp/vault:1.21
    networks:
      - dmtnetwork
    ports:
      - 8200:8200
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    cap_add:
      - IPC_LOCK

  kong:
    restart: always
    image: kong:3.9
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 10s
      retries: 10
    command:
      - sh
      - -c
      - 'awk -v k="$$AUTH_JWT_KEY" ''{gsub(/\$\{AUTH_JWT_KEY\}/, k); print}'' /home/kong/kong.yml.tpl > /tmp/kong.yml && exec kong start --vv'
    environment:
      - KONG_DATABASE=off
      - KONG_CASSANDRA_CONTACT_POINTS=kong-database
      - KONG_ADMIN_LISTEN=0.0.0.0:8001
      - KONG_ADMIN_LISTEN_SSL=0.0.0.0:8444
      - KONG_NGINX_DAEMON=off
      - KONG_DECLARATIVE_CONFIG=/tmp/kong.yml
      - KONG_PROXY_ERROR_LOG=/dev/stderr
      - KONG_PROXY_ACCESS_LOG=/dev/stdout
      - KONG_ADMIN_ACCESS_LOG=/dev/stdout
      - KONG_ADMIN_ERROR_LOG=/dev/stderr
      - KONG_DNS_ORDER=LAST,A,CNAME
      - KONG_UPSTREAM_KEEPALIVE_POOL_SIZE=0
      - KONG_STREAM_LISTEN=0.0.0.0:4433
      - AUTH_JWT_KEY=${AUTH_JWT_KEY}
    networks:
      - dmtnetwork
    volumes:
      - ./kong.yaml:/home/kong/kong.yml.tpl
    ports:
      - 443:8443
      - 8001:8001
      - "${MPSPORT}:4433"

volumes:
  app-volume:
  private-volume:

networks:
  dmtnetwork:
    driver: "bridge"
