# Traefik-based gateway variant.
# Use: docker compose -f docker-compose.traefik.yml up -d
# Routes and middleware are defined in ./traefik/dynamic.yml and reload live
# without restarting this stack (providers.file.watch=true).
name: device-management-toolkit

services:
  console:
    restart: always
    image: intel/device-mgmt-toolkit-console:latest
    build:
      context: ./services/console
      dockerfile: ./Dockerfile
    networks:
      - dmtnetwork
    env_file:
      - .env
    environment:
      GIN_MODE: release
      HEADLESS: "true"
      APP_COMMON_NAME: ${MPS_COMMON_NAME}
      DB_PROVIDER: postgres
      DB_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/rpsdb
      SECRETS_ADDR: http://vault:8200
      SECRETS_TOKEN: ${VAULT_TOKEN}
      SECRETS_PATH: ${SECRETS_PATH}
      HTTP_HOST: "0.0.0.0"
      HTTP_PORT: "8181"
      HTTP_TLS_ENABLED: "false"
      LOG_LEVEL: ${LOG_LEVEL}
      APP_DISABLE_CIRA: "false"
      NO_PROXY: "${NO_PROXY:-localhost,127.0.0.1,::1},vault"
      no_proxy: "${no_proxy:-localhost,127.0.0.1,::1},vault"
    healthcheck:
      test: ["CMD", "/app", "--health"]
      interval: 12s
      timeout: 12s
      retries: 3
    expose:
      - "8181"
      - "4433"

  webui:
    restart: always
    image: intel/oact-webui:latest
    networks:
      - dmtnetwork
    build:
      context: ./services/sample-web-ui
      dockerfile: ./Dockerfile
      args:
        BUILD_CONFIGURATION: enterprise
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    environment:
      CONSOLE_SERVER_API: https://${MPS_COMMON_NAME}
      VAULT_SERVER: https://${MPS_COMMON_NAME}/vault

  rps:
    restart: always
    image: intel/oact-rps:latest
    networks:
      - dmtnetwork
    build:
      context: ./services/rps
      dockerfile: ./Dockerfile
    env_file:
      - .env
    healthcheck:
      interval: 12s
      timeout: 12s
      retries: 3
      test: ["CMD", "node", "rps/dist/Healthcheck.js"]
    environment:
      RPS_MPS_SERVER: http://console:8181
      RPS_SECRETS_PATH: ${SECRETS_PATH}
      RPS_VAULT_TOKEN: ${VAULT_TOKEN}
      RPS_VAULT_ADDRESS: ${VAULT_ADDRESS}
      RPS_CONNECTION_STRING: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/rpsdb
      RPS_CONSUL_ENABLED: ${CONSUL_ENABLED}
      RPS_CONSUL_HOST: ${CONSUL_HOST}
      RPS_CONSUL_PORT: ${CONSUL_PORT}

  db:
    restart: always
    image: postgres:18
    build:
      context: ./pg
      dockerfile: ./Dockerfile
    networks:
      - dmtnetwork
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d rpsdb"]
      interval: 2s
      timeout: 3s
      retries: 30
    environment:
      POSTGRES_DB: rpsdb
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - 5432:5432

  vault:
    restart: always
    image: hashicorp/vault:1.21
    networks:
      - dmtnetwork
    ports:
      - 8200:8200
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    cap_add:
      - IPC_LOCK

  traefik:
    restart: always
    image: traefik:v3.1
    healthcheck:
      # entrypoints.traefik.address must match the --api/--ping listener
      test: ["CMD", "traefik", "healthcheck", "--ping", "--entrypoints.traefik.address=127.0.0.1:8080"]
      interval: 10s
      timeout: 10s
      retries: 10
    command:
      - --api.dashboard=true
      - --ping=true
      - --providers.docker=false
      # File provider: edit ./traefik/dynamic.yml at runtime for zero-restart config changes
      - --providers.file.filename=/etc/traefik/dynamic.yml
      - --providers.file.watch=true
      - --entrypoints.websecure.address=:443
      - --entrypoints.cira.address=:4433
      - --log.level=INFO
      - --accesslog=true
    environment:
      # Prevent corporate proxy from intercepting internal Docker network traffic
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: "localhost,127.0.0.1,::1,console,webui,rps,vault,db,traefik"
      no_proxy: "localhost,127.0.0.1,::1,console,webui,rps,vault,db,traefik"
    networks:
      - dmtnetwork
    volumes:
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
    ports:
      - 443:443
      - 8080:8080
      - "${MPSPORT}:4433"

volumes:
  app-volume:
  private-volume:

networks:
  dmtnetwork:
    driver: "bridge"
