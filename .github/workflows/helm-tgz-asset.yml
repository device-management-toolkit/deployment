on:
  push:
    tags:
      - "*"
name: Build and release on push
permissions:
  contents: read
jobs:
  release:
    name: create release artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: clone open amt examples repo
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.ref }}
          persist-credentials: false

      - name: Print github workspace
        run: echo $GITHUB_WORKSPACE && pwd && echo ${{ github.workspace }}

      - name: tar zip helm directory
        shell: bash
        run: |
          tar -czvf device-mgmt-toolkit-helm.tar.gz charts

      - name: upload helm tarball release artifact
        uses: svenstaro/upload-release-action@29e53e917877a24fad85510ded594ab3c9ca12de # v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ github.workspace}}/device-mgmt-toolkit-helm.tar.gz
          asset_name: device-mgmt-toolkit-helm.tar.gz
          tag: ${{ github.ref }}
          overwrite: true
          body: "Device Management Toolkit Helm deployment tarball asset"
