name: Build Linux Installer

on:
  workflow_dispatch:
    inputs:
      console_version:
        description: "Console release tag to package. Empty = latest."
        required: false
        default: ""
      arch:
        description: "Target architecture."
        required: true
        default: "amd64"
        type: choice
        options:
          - amd64
          - arm64

permissions:
  contents: read

jobs:
  build:
    name: Build Linux installer (stub)
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Not yet implemented
        run: |
          echo "::warning::Linux installer is not yet implemented."
          echo "Add scripts under installers/linux/ and replace this stub."
          echo "See installers/macos/ for reference layout (build script + payload scripts + resources)."
          exit 0
