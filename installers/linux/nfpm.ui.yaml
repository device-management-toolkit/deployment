# Device Management Toolkit Console - nFPM manifest (UI edition)
# Copyright (c) Intel Corporation
# SPDX-License-Identifier: Apache-2.0
#
# Tray-mode install matching macOS PKG and Windows NSIS:
#   - binary auto-launched as the desktop user with --tray
#   - XDG autostart entry restores the tray on every login
#   - no systemd service (servers run `dmt-console --tray` manually or skip tray)

name: dmt-console
arch: amd64
platform: linux
version: ${VERSION}
version_schema: semver
section: net
priority: optional
maintainer: "Intel Device Management Toolkit <dmt@intel.com>"
description: |
  Device Management Toolkit Console - on-prem AMT/MEI management server.
  Full edition with embedded web UI on port 8181 (TLS by default) and a
  system tray (fyne.io/systray, GTK3 + Ayatana AppIndicator).
vendor: Intel Corporation
homepage: https://device-management-toolkit.github.io/
license: Apache-2.0

depends:
  - openssl
  - libgtk-3-0
  - libayatana-appindicator3-1

overrides:
  rpm:
    depends:
      - openssl
      - gtk3
      - libayatana-appindicator-gtk3

contents:
  - src: ./build/console_linux_x64_tray
    dst: /opt/dmt-console/dmt-console
    file_info:
      mode: 0755
      owner: root
      group: root

  - src: /opt/dmt-console/dmt-console
    dst: /usr/bin/dmt-console
    type: symlink

  - src: ./bin/dmt-configure
    dst: /usr/bin/dmt-configure
    file_info:
      mode: 0755
      owner: root
      group: root

  - src: ./bin/dmt-uninstall
    dst: /usr/bin/dmt-uninstall
    file_info:
      mode: 0755
      owner: root
      group: root

  - src: ./autostart/dmt-console.desktop
    dst: /etc/xdg/autostart/dmt-console.desktop
    file_info:
      mode: 0644
      owner: root
      group: root

  - src: ./config/config.yml.tmpl
    dst: /usr/share/dmt-console/config.yml.tmpl
    file_info:
      mode: 0644
      owner: root
      group: root

  - src: ../../LICENSE
    dst: /usr/share/doc/dmt-console/copyright
    file_info:
      mode: 0644

  - src: ./README.md
    dst: /usr/share/doc/dmt-console/README.md
    file_info:
      mode: 0644

  - dst: /opt/dmt-console
    type: dir
    file_info:
      mode: 0755
      owner: root
      group: root

scripts:
  preinstall: ./build/preinstall.sh
  postinstall: ./scripts/postinstall.sh
  preremove: ./scripts/preremove.sh
  postremove: ./scripts/postremove.sh

rpm:
  compression: zstd
  group: Applications/System

deb:
  compression: zstd
